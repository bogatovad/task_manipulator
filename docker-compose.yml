volumes:
  cism_postgres_data:
  cism_rabbitmq_1_data:
  cism_rabbitmq_2_data:
  cism_rabbitmq_3_data:

networks:
  default:
    name: cism
    external: true

x-app: &app
  logging:
    driver: "json-file"
    options:
      max-file: "3"
      max-size: "10m"
  restart: always

x-rabbitmq-node: &rabbitmq-node
  <<: *app
  image: rabbitmq:3.13-management
  environment: &rabbitmq-env
    RABBITMQ_ERLANG_COOKIE: cism_cluster_cookie
  volumes: &rabbitmq-volumes
    - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
  healthcheck:
    test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
    interval: 10s
    timeout: 5s
    retries: 10
    start_period: 40s

x-worker: &worker
  <<: *app
  build:
    context: ./
    dockerfile: ./src/frameworks_and_drivers/http_web_fastapi/Dockerfile
  command:
    ["uv", "run", "python", "-m", "src.frameworks_and_drivers.queue_implementations.consumer.consumer"]
  env_file:
    - environments/db.env
    - environments/rabbitmq.env
    - environments/model.env
    - environments/redis.env
  depends_on:
    pgbouncer:
      condition: service_started
    redis:
      condition: service_started
    rabbitmq:
      condition: service_healthy

services:
  nginx:
    <<: *app
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi

  fastapi:
    <<: *app
    build:
      context: ./
      dockerfile: ./src/frameworks_and_drivers/http_web_fastapi/Dockerfile
    expose:
      - 8000
    env_file:
      - environments/db.env
      - environments/rabbitmq.env
      - environments/redis.env
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: 3

  worker-high:
    <<: *worker
    environment:
      RABBITMQ_QUEUE_NAME: tasks.high
    deploy:
      replicas: 3

  worker-medium:
    <<: *worker
    environment:
      RABBITMQ_QUEUE_NAME: tasks.medium
    deploy:
      replicas: 2

  worker-low:
    <<: *worker
    environment:
      RABBITMQ_QUEUE_NAME: tasks.low
    deploy:
      replicas: 1

  redis:
    <<: *app
    image: redis:7-alpine
    hostname: redis
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    <<: *app
    image: edoburu/pgbouncer:1.22.1-p0
    hostname: pgbouncer
    expose:
      - 6432
    volumes:
      - ./docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      db:
        condition: service_started

  rabbitmq:
    <<: *app
    image: haproxy:2.9-alpine
    hostname: rabbitmq
    ports:
      - "5672:5672"
    volumes:
      - ./docker/haproxy/rabbitmq.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      rabbitmq-1:
        condition: service_healthy
      rabbitmq-2:
        condition: service_healthy
      rabbitmq-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 3

  rabbitmq-1:
    <<: *rabbitmq-node
    hostname: rabbitmq-1
    environment:
      <<: *rabbitmq-env
      RABBITMQ_NODENAME: rabbit@rabbitmq-1
    ports:
      - "15672:15672"
    volumes:
      - cism_rabbitmq_1_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro

  rabbitmq-2:
    <<: *rabbitmq-node
    hostname: rabbitmq-2
    environment:
      <<: *rabbitmq-env
      RABBITMQ_NODENAME: rabbit@rabbitmq-2
    volumes:
      - cism_rabbitmq_2_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    depends_on:
      rabbitmq-1:
        condition: service_healthy

  rabbitmq-3:
    <<: *rabbitmq-node
    hostname: rabbitmq-3
    environment:
      <<: *rabbitmq-env
      RABBITMQ_NODENAME: rabbit@rabbitmq-3
    volumes:
      - cism_rabbitmq_3_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    depends_on:
      rabbitmq-1:
        condition: service_healthy

  db:
    <<: *app
    hostname: db
    image: postgres:15
    ports:
      - "5532:5432"
    env_file:
      - environments/db.env
    restart: unless-stopped
    volumes:
      - cism_postgres_data:/var/lib/postgresql/data
