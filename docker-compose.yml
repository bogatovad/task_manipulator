volumes:
  cism_postgres_data:

networks:
  default:
    name: cism
    external: true

x-app: &app
  logging:
    driver: "json-file"
    options:
      max-file: "3"
      max-size: "10m"
  restart: always

services:
  fastapi:
    <<: *app
    hostname: fastapi_web
    build:
      context: ./
      dockerfile: ./src/frameworks_and_drivers/http_web_fastapi/Dockerfile
    expose:
      - 8000
    ports:
      - "8000:8000"
    volumes:
      - ./src/:/opt/src/
    deploy:
      replicas: 1

  db:
    <<: *app
    hostname: db
    image: postgres:15
    ports:
     - "5532:5432"
    env_file:
      - environments/db.env
    restart: unless-stopped
    volumes:
      - cism_postgres_data:/var/lib/postgresql/data
