volumes:
  cism_postgres_data:
  cism_rabbitmq_data:

networks:
  default:
    name: cism
    external: true

x-app: &app
  logging:
    driver: "json-file"
    options:
      max-file: "3"
      max-size: "10m"
  restart: always

x-worker: &worker
  <<: *app
  build:
    context: ./
    dockerfile: ./src/frameworks_and_drivers/http_web_fastapi/Dockerfile
  command:
    ["uv", "run", "python", "-m", "src.frameworks_and_drivers.queue_implementations.consumer.consumer"]
  env_file:
    - environments/db.env
    - environments/rabbitmq.env
  depends_on:
    db:
      condition: service_started
    rabbitmq:
      condition: service_healthy

services:
  nginx:
    <<: *app
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - fastapi

  fastapi:
    <<: *app
    build:
      context: ./
      dockerfile: ./src/frameworks_and_drivers/http_web_fastapi/Dockerfile
    expose:
      - 8000
    env_file:
      - environments/db.env
      - environments/rabbitmq.env
    depends_on:
      db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: 3

  worker-high:
    <<: *worker
    environment:
      RABBITMQ_QUEUE_NAME: tasks.high
    deploy:
      replicas: 3

  worker-medium:
    <<: *worker
    environment:
      RABBITMQ_QUEUE_NAME: tasks.medium
    deploy:
      replicas: 2

  worker-low:
    <<: *worker
    environment:
      RABBITMQ_QUEUE_NAME: tasks.low
    deploy:
      replicas: 1

  rabbitmq:
    <<: *app
    hostname: rabbitmq
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - cism_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    <<: *app
    hostname: db
    image: postgres:15
    ports:
      - "5532:5432"
    env_file:
      - environments/db.env
    restart: unless-stopped
    volumes:
      - cism_postgres_data:/var/lib/postgresql/data
